<!DOCTYPE html>
<html>
<head>
    <title>Eron</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <video id="video-bg" loop playsinline></video>
        <div id="image-bg"></div>
    </div>

    <div id="ui">
        <h1 id="time">00:00</h1>
        <label for="upload" class="upload-btn">Change Wallpaper</label>
        <input type="file" id="upload" accept="video/mp4,video/quicktime,image/gif" hidden>
        <div id="audio-notice">Click anywhere to enable audio</div>
    </div>

    <script src="newtab.js"></script>
</body>
</html>
